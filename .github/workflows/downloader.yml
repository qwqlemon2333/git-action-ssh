name: Debugging with SSH
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      issues: write  # 授予创建和关闭 Issue 的权限
      contents: read
    steps:
      - uses: actions/checkout@v1

       
    # # You might want to Checkout your repo first, but not mandatory
    #   - name: Check Out
    #     uses: actions/checkout@v3
    # # Cleanup The Actions Workspace Using Custom Composite Run Actions
    #   - name: Cleanup
    #     uses: rokibhasansagar/slimhub_actions@main
          
    #   - name: Prepare the environment
    #     run: |
    #       sudo apt update
    #       # sudo add-apt-repository universe
    #       # sudo apt-get install fakeroot dpkg-dev libcurl4-openssl-dev python3 python3-pip python2 pigz -y
    #       # sudo apt-get install aptitude -y
    #       # sudo aptitude install bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev -y
    #       # sudo aptitude install openjdk-8-jdk -y
    #       # curl https://bootstrap.pypa.io/pip/2.7/get-pip.py --output get-pip.py
    #       # sudo python2 get-pip.py
    #       sudo apt install cpio python3 git -y
    #       sudo su
    #       git clone https://github.com/AndroidDumps/dumpyara.git
    #       # rm -f get-pip.py
          
      - name: Start Tunnels and Notify Users
        env:
            USER_PASS: ${{ secrets.USER_PASS }}
        run: |
          # ==========================================
          # 1. 基础环境配置
          # ==========================================
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y openssh-server curl jq > /dev/null 2>&1
          if [[ -z "$USER_PASS" ]]; then
            echo "Please set 'USER_PASS' for user: $USER"
            exit 3
          fi 
          echo "### Update user: $USER password ###"
          echo -e "$USER_PASS\n$USER_PASS" | sudo passwd "$USER"
          sudo service ssh start

          # ==========================================
          # 2. 启动 Serveo
          # ==========================================
          SERVEO_HANDLE=$(date +%s%3N)
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -N -R $SERVEO_HANDLE:22:localhost:22 serveo.net > serveo.log 2>&1 &

          # ==========================================
          # 3. 启动 Cloudflared
          # ==========================================
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url ssh://localhost:22 > cloudflared.log 2>&1 &

          # ==========================================
          # 4. 启动 Ngrok
          # ==========================================
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xzf ngrok-v3-stable-linux-amd64.tgz
          chmod +x ./ngrok
          ./ngrok authtoken ${{ secrets.NGROK_TOKEN }}
          ./ngrok tcp 22 --log ".ngrok.log" &

          # ==========================================
          # 5. 等待初始化
          # ==========================================
          echo "Waiting for tunnels..."
          sleep 10

          # ==========================================
          # 6. 准备报告内容 (优化 Markdown 格式)
          # ==========================================          
          # --- Ngrok 处理 ---
          NGROK_URL=$(grep -o -E "tcp://(.+)" < .ngrok.log | sed "s/tcp:\/\///" | head -n 1)
          if [[ -n "$NGROK_URL" ]]; then
            NGROK_HOST=$(echo $NGROK_URL | cut -d: -f1)
            NGROK_PORT=$(echo $NGROK_URL | cut -d: -f2)
            TEST_LINK="https://www.itdog.cn/tcping/${NGROK_HOST}:${NGROK_PORT}/"
            # 使用 $'...' 语法实现真正的换行，并使用代码块
            NGROK_BLOCK=$'### 1. Ngrok (推荐)\n```bash\n'"ssh ${USER}@${NGROK_HOST} -p ${NGROK_PORT}"$'\n```\n'"[🚀 点击测速 (国内多节点延迟)](${TEST_LINK})"
          else
            NGROK_BLOCK="### 1. Ngrok\n❌ 启动失败"
          fi

          # --- Serveo 处理 ---
          SERVEO_BLOCK=$'### 2. Serveo (备用)\n```bash\n'"ssh -J serveo.net ${USER}@${SERVEO_HANDLE}"$'\n```\n'"[🚀 点击测速 (Serveo连通性)](https://www.itdog.cn/tcping/serveo.net:22/)"

          # --- Cloudflared 处理 ---
          CF_URL=$(grep -o 'https://.*\.trycloudflare\.com' cloudflared.log | head -n 1)
          if [[ -n "$CF_URL" ]]; then
            CF_HOST=$(echo $CF_URL | sed 's/https:\/\///')
            # 这里的命令比较长，自动换行显示
            CF_BLOCK=$'### 3. Cloudflared (无需客户端)\n```bash\n'"ssh -o ProxyCommand=\"cloudflared access ssh --hostname %h\" ${USER}@${CF_HOST}"$'\n```\n'"[🚀 点击测速 (Cloudflare连通性)](https://www.itdog.cn/http/${CF_HOST}/)"
          else
            CF_BLOCK="### 3. Cloudflared\n⏳ 等待URL生成..."
          fi

          # ==========================================
          # 7. 组合并创建 Issue
          # ==========================================
          MENTIONS="@qwqlemon2333 @KawaiiSparkle"
          ISSUE_TITLE="🚀 SSH Tunnel Online $(date +%H:%M:%S)"
          
          # 拼接最终主体，$'...' 中的换行符是真实的
          ISSUE_BODY=$"${MENTIONS}

          🔑 **密码:** 隐藏字段
        
          ---
        
          ${NGROK_BLOCK}
        
          ---
        
          ${SERVEO_BLOCK}
        
          ---
        
          ${CF_BLOCK}
        
          ---
        
          ⚠️ **提示**: 点击上方“测速链接”查看国内连通性
          🤖 此 Issue 由 Action 自动创建，连接有效期为 Action 运行期间"

          # 使用 jq 生成 JSON
          JSON_PAYLOAD=$(jq -n \
            --arg title "$ISSUE_TITLE" \
            --arg body "$ISSUE_BODY" \
            '{title: $title, body: $body}')

          # 发送请求
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d "$JSON_PAYLOAD")

          # 解析结果并关闭
          ISSUE_NUMBER=$(echo "$RESPONSE" | jq -r '.number')

          if [[ "$ISSUE_NUMBER" != "null" && -n "$ISSUE_NUMBER" ]]; then
            echo "Successfully created Issue #$ISSUE_NUMBER"
            
            # 30s后关闭 Issue
            sleep 30s
            curl -s -X PATCH \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER \
              -d '{"state": "closed"}'
            
            echo "Issue #$ISSUE_NUMBER closed."
          else
            echo "Failed to create Issue."
            echo "Response: $RESPONSE"
          fi
          

      - name: sleep for a minute
        run: |
          pwd
          date
          sleep 10h
          date

